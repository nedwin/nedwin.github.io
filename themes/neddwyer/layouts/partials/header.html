{{ $isWriting := or (eq .Section "posts") (eq .RelPermalink "/posts/") }}
{{ $isAbout := eq .RelPermalink "/about/" }}
{{ $isNow := eq .RelPermalink "/now/" }}
{{ $isElsewhere := eq .RelPermalink "/elsewhere/" }}
<nav class="topNav" aria-label="Primary">
  <a href="{{ "/" | absURL }}" class="brand">Ned Dwyer</a>
  <span class="links">
    <a href="{{ "/posts/" | absURL }}"{{ if $isWriting }} class="active" aria-current="page"{{ end }}>Writing</a>
    <a href="{{ "/about/" | absURL }}"{{ if $isAbout }} class="active" aria-current="page"{{ end }}>About</a>
    <a href="{{ "/now/" | absURL }}"{{ if $isNow }} class="active" aria-current="page"{{ end }}>Now</a>
    <a href="{{ "/elsewhere/" | absURL }}"{{ if $isElsewhere }} class="active" aria-current="page"{{ end }}>Elsewhere</a>
  </span>
</nav>
